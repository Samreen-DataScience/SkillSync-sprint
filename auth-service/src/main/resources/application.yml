spring:
  application:
    name: auth-service
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skillsync_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:skillsync}
    password: ${DB_PASSWORD:SkillSync@123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: ${SERVER_PORT:9001}

security:
  jwt:
    secret: ${JWT_SECRET:skillsyncskillsyncskillsyncskillsyncskillsync12345}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
