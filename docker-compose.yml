services:
  mysql:
    image: mysql:8.4
    container_name: skillsync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql@123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: skillsync-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7.4-alpine
    container_name: skillsync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zipkin:
    image: openzipkin/zipkin:3.4.2
    container_name: skillsync-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"

  sonarqube:
    image: sonarqube:lts-community
    container_name: skillsync-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: discovery-server
    container_name: skillsync-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - zipkin

  config-server:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: config-server
    container_name: skillsync-config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      JAVA_TOOL_OPTIONS: -Deureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - discovery-server
      - zipkin

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: api-gateway
    container_name: skillsync-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: -Deureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - discovery-server
      - config-server
      - auth-service
      - user-service
      - mentor-service
      - skill-service
      - session-service
      - group-service
      - review-service
      - notification-service

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: auth-service
    container_name: skillsync-auth-service
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      JAVA_TOOL_OPTIONS: -Deureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
    depends_on:
      - mysql
      - discovery-server
      - config-server
      - zipkin

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: user-service
    container_name: skillsync-user-service
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
    depends_on:
      - mysql
      - discovery-server
      - config-server
      - zipkin

  mentor-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: mentor-service
    container_name: skillsync-mentor-service
    restart: unless-stopped
    ports:
      - "9003:9003"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_mentor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
    depends_on:
      - mysql
      - discovery-server
      - config-server
      - zipkin

  skill-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: skill-service
    container_name: skillsync-skill-service
    restart: unless-stopped
    ports:
      - "9004:9004"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_skill_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
    depends_on:
      - mysql
      - redis
      - discovery-server
      - config-server
      - zipkin

  session-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: session-service
    container_name: skillsync-session-service
    restart: unless-stopped
    ports:
      - "9005:9005"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_session_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    depends_on:
      - mysql
      - rabbitmq
      - discovery-server
      - config-server
      - zipkin

  group-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: group-service
    container_name: skillsync-group-service
    restart: unless-stopped
    ports:
      - "9006:9006"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_group_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
    depends_on:
      - mysql
      - discovery-server
      - config-server
      - zipkin

  review-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: review-service
    container_name: skillsync-review-service
    restart: unless-stopped
    ports:
      - "9007:9007"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_review_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
    depends_on:
      - mysql
      - discovery-server
      - config-server
      - zipkin

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_DIR: notification-service
    container_name: skillsync-notification-service
    restart: unless-stopped
    ports:
      - "9008:9008"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql@123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    depends_on:
      - mysql
      - rabbitmq
      - discovery-server
      - config-server
      - zipkin

  prometheus:
    image: prom/prometheus
    container_name: skillsync-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
        VITE_AUTH_SERVICE_URL: http://localhost:9001
    container_name: skillsync-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
      - auth-service
volumes:
  mysql_data:
  redis_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

