server:
  port: 9004

spring:
  application:
    name: skill-service
  datasource:
    url: jdbc:mysql://localhost:3306/skillsync_skill_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: USERNAME
    password: PASSWORD
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 10m
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: "skillsyncskillsyncskillsyncskillsyncskillsync12345"

