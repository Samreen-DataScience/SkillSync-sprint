server:
  port: 9007

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:mysql://localhost:3306/skillsync_review_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: USERNAME
    password: PASSWORD
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: "skillsyncskillsyncskillsyncskillsyncskillsync12345"

resilience4j:
  circuitbreaker:
    instances:
      mentorRatingUpdate:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      mentorRatingUpdate:
        timeoutDuration: 3s

