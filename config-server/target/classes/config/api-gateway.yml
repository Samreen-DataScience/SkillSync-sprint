server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: mentor-service
          uri: lb://mentor-service
          predicates:
            - Path=/mentors/**
        - id: skill-service
          uri: lb://skill-service
          predicates:
            - Path=/skills/**
        - id: session-service
          uri: lb://session-service
          predicates:
            - Path=/sessions/**
        - id: group-service
          uri: lb://group-service
          predicates:
            - Path=/groups/**
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/reviews/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**

security:
  jwt:
    secret: "skillsyncskillsyncskillsyncskillsyncskillsync12345"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  info:
    env:
      enabled: true
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,gateway,mappings

info:
  app:
    name: SkillSync API Gateway
    version: 1.0.0
    description: SkillSync backend microservices API gateway
    environment: local
    routes:
      auth: /auth/**
      users: /users/**
      mentors: /mentors/**
      skills: /skills/**
      sessions: /sessions/**
      groups: /groups/**
      reviews: /reviews/**
      notifications: /notifications/**
