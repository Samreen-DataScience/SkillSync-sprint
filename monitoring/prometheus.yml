global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "auth-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9001"]

  - job_name: "user-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9002"]

  - job_name: "mentor-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9003"]

  - job_name: "skill-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9004"]

  - job_name: "session-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9005"]

  - job_name: "group-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9006"]

  - job_name: "review-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9007"]

  - job_name: "notification-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9008"]
